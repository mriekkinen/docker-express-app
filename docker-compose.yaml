services:
  watchtower:
    image: nickfedor/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
  express-app:
    image: mriekkin2/docker-express-app
    platform: linux/amd64
    ports:
      - 8080:8080
